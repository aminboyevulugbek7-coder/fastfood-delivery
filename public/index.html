<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastFood Delivery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
    <style>
        html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }
        .hero { padding: 20px 0 30px !important; }
        .hero h1 { font-size: 22px !important; line-height: 1.3 !important; }
        .hero p { font-size: 13px !important; margin-top: 8px !important; }
        .categories-section { margin-top: -15px !important; }
        .categories-wrapper { padding: 12px !important; border-radius: 12px !important; }
        .food-section { padding: 15px 0 40px !important; }
        .section-title { font-size: 18px !important; }
        .navbar { padding: 10px 0 !important; }
        .logo-icon { width: 36px !important; height: 36px !important; font-size: 18px !important; }
        .logo-text { font-size: 16px !important; }
        .cart-btn { padding: 8px 14px !important; font-size: 13px !important; }
        .nav-link { padding: 6px 10px !important; font-size: 13px !important; }
        .category-btn { min-width: 60px !important; padding: 8px 12px !important; }
        .category-icon { font-size: 20px !important; }
        .category-name { font-size: 11px !important; }
        .food-card { border-radius: 10px !important; }
        .food-image { height: 150px !important; }
        .food-info { padding: 12px !important; }
        .food-name { font-size: 15px !important; }
        .food-description { font-size: 12px !important; height: auto !important; }
        .food-price { font-size: 16px !important; }
        .add-to-cart { padding: 10px 16px !important; font-size: 13px !important; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <div class="logo-icon">🍔</div>
                    <div class="logo-text">Fast<span>Food</span></div>
                </a>
                <div class="nav-links">
                    <a href="admin.html" class="nav-link">🔐 Admin</a>
                    <button class="cart-btn" onclick="toggleCart()">
                        🛒 <span class="cart-count" id="cartCount">0</span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Mazali taomlar eshigingizgacha! 🚀</h1>
                <p>Tez va oson buyurtma bering!</p>
            </div>
        </div>
    </section>

    <section class="categories-section">
        <div class="container">
            <div class="categories-wrapper">
                <div class="category-list" id="categoryList"></div>
            </div>
        </div>
    </section>

    <section class="food-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title" id="sectionTitle">Barcha taomlar</h2>
            </div>
            <div class="food-grid" id="foodGrid"></div>
        </div>
    </section>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Savatingiz</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-summary">
                <div class="cart-row total">
                    <span>Jami:</span>
                    <span id="cartTotal">0 so'm</span>
                </div>
            </div>
            <button class="checkout-btn" onclick="goToCheckout()">Buyurtma berish →</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let foods = [], categories = [], chatId = '';

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            chatId = tg.initDataUnsafe.user.id.toString();
            localStorage.setItem('chatId', chatId);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadFoods();
            updateCartUI();
            
            tg.MainButton.setText("BUYURTMA BERISH");
            tg.MainButton.onClick(() => {
                if (cart.length === 0) {
                    tg.showAlert('Savat bo\'sh!');
                } else {
                    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                    tg.showConfirm(`Jami: ${formatPrice(total)}. Buyurtma berasizmi?`, (ok) => {
                        if (ok) goToCheckout();
                    });
                }
            });
        });

        async function loadCategories() {
            const res = await fetch('/api/categories');
            categories = await res.json();
            document.getElementById('categoryList').innerHTML = `<button class="category-btn active" onclick="filterFoods()"><span class="category-icon">🍽️</span><span class="category-name">Hammasi</span></button>` + 
                categories.map(cat => `<button class="category-btn" onclick="filterFoods('${cat.name}')"><span class="category-icon">${cat.icon||'🍽️'}</span><span class="category-name">${cat.name}</span></button>`).join('');
        }

        async function loadFoods() {
            const res = await fetch('/api/foods');
            foods = await res.json();
            renderFoods(foods);
        }

        function renderFoods(list) {
            const grid = document.getElementById('foodGrid');
            if (!list.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;text-align:center;padding:40px;"><div style="font-size:48px;">🍽️</div><h3>Taomlar yo\'q</h3></div>'; return; }
            grid.innerHTML = list.map(f => {
                const cat = categories.find(c=>c.name===f.category);
                const hasImg = f.image && f.image.length > 0;
                return `<div class="food-card">
                    <div class="food-image"${hasImg?' style="background:none;"':''}>${hasImg?`<img src="${f.image}">`:(cat?cat.icon:'🍽️')}<span class="food-badge">Yangi</span></div>
                    <div class="food-info">
                        <div class="food-category">${f.category}</div>
                        <div class="food-name">${f.name}</div>
                        <div class="food-description">${f.description||''}</div>
                        <div class="food-footer">
                            <div class="food-price">${formatPrice(f.price)}</div>
                            <button class="add-to-cart" onclick="addToCart(${f.id},'${f.name.replace(/'/g,"\\'")}',${f.price})">+ Qo'shish</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function filterFoods(cat) {
            document.querySelectorAll('.category-btn').forEach(b=>b.classList.toggle('active', b.querySelector('.category-name').textContent===(cat||'Hammasi')));
            document.getElementById('sectionTitle').textContent = cat||'Barcha taomlar';
            renderFoods(cat ? foods.filter(f=>f.category===cat) : foods);
        }

        function addToCart(id,name,price) {
            const item = cart.find(i=>i.id===id);
            if(item) item.quantity++; else cart.push({id,name,price,quantity:1});
            localStorage.setItem('cart',JSON.stringify(cart));
            updateCartUI();
            toggleCart();
        }

        function updateQuantity(id,change) {
            const item = cart.find(i => i.id === id);
            if(item) { 
                item.quantity += change; 
                if(item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartUI();
            }
        }

        function removeFromCart(id) { cart=cart.filter(i=>i.id!==id); localStorage.setItem('cart',JSON.stringify(cart)); updateCartUI(); }

        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.reduce((s,i)=>s+i.quantity,0);
            const itemsDiv = document.getElementById('cartItems');
            if(!cart.length) { itemsDiv.innerHTML='<div class="empty-state" style="padding:40px;text-align:center;"><div style="font-size:48px;">🛒</div><h3>Savat bo\'sh</h3></div>'; }
            else { itemsDiv.innerHTML = cart.map(i=>`<div class="cart-item"><div class="cart-item-image">🍽️</div><div class="cart-item-info"><div class="cart-item-name">${i.name}</div><div class="cart-item-price">${formatPrice(i.price)}</div><div class="quantity-control"><button class="quantity-btn" onclick="updateQuantity(${i.id},-1)">−</button><span class="quantity-value">${i.quantity}</span><button class="quantity-btn" onclick="updateQuantity(${i.id},1)">+</button></div></div><div class="remove-item" onclick="removeFromCart(${i.id})">🗑️</div></div>`).join(''); }
            document.getElementById('cartTotal').textContent = formatPrice(cart.reduce((s,i)=>s+i.price*i.quantity,0));
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function goToCheckout() {
            if(!cart.length) return;
            window.location.href = '/checkout.html';
        }

        function formatPrice(p) { return new Intl.NumberFormat('uz-UZ').format(p)+" so'm"; }
    </script>
</body>
</html>
