<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood Delivery - Mazali taomlar yetkazib berish</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <div class="logo-icon">🍔</div>
                    <div class="logo-text">Fast<span>Food</span></div>
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">Bosh sahifa</a>
                    <a href="/orders.html" class="nav-link">Buyurtmalarim</a>
                    <a href="/admin.html" class="nav-link">Admin</a>
                    <button class="cart-btn" onclick="toggleCart()">
                        🛒 Savat
                        <span class="cart-count" id="cartCount">0</span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Mazali taomlar eshigingizgacha! 🚀</h1>
                <p>Eng yaxshi restoranlardan tezkor yetkazib berish xizmati. Buyurtma bering va 30 daqiqada oling!</p>
            </div>
        </div>
    </section>

    <section class="categories-section">
        <div class="container">
            <div class="categories-wrapper">
                <div class="category-list" id="categoryList">
                    <!-- Categories will be loaded here -->
                </div>
            </div>
        </div>
    </section>

    <section class="food-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title" id="sectionTitle">Barcha taomlar</h2>
            </div>
            <div class="food-grid" id="foodGrid">
                <!-- Foods will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Savatingiz</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-summary">
                <div class="cart-row">
                    <span>Taomlar</span>
                    <span id="cartSubtotal">0 so'm</span>
                </div>
                <div class="cart-row">
                    <span>Yetkazib berish</span>
                    <span>Bepul</span>
                </div>
                <div class="cart-row total">
                    <span>Jami</span>
                    <span id="cartTotal">0 so'm</span>
                </div>
            </div>
            <button class="checkout-btn" onclick="goToCheckout()">
                Buyurtma berish →
            </button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let foods = [];
        let categories = [];
        let chatId = '';

        // Telegram Web App'dan chatId olish
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                chatId = tg.initDataUnsafe.user.id.toString();
                localStorage.setItem('chatId', chatId);
                console.log('Telegram chatId:', chatId);
            }
        } else {
            // URL parametrdan olish
            const urlParams = new URLSearchParams(window.location.search);
            const urlChatId = urlParams.get('chat_id');
            if (urlChatId) {
                chatId = urlChatId;
                localStorage.setItem('chatId', chatId);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadFoods();
            updateCartUI();
        });

        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                categories = await response.json();
                renderCategories();
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        async function loadFoods() {
            try {
                const response = await fetch('/api/foods');
                foods = await response.json();
                renderFoods(foods);
            } catch (err) {
                console.error('Error loading foods:', err);
            }
        }

        function renderCategories() {
            const list = document.getElementById('categoryList');
            list.innerHTML = `
                <button class="category-btn active" onclick="filterFoods()">
                    <span class="category-icon">🍽️</span>
                    <span class="category-name">Hammasi</span>
                </button>
                ${categories.map(cat => `
                    <button class="category-btn" onclick="filterFoods('${cat.name}')">
                        <span class="category-icon">${cat.icon || '🍽️'}</span>
                        <span class="category-name">${cat.name}</span>
                    </button>
                `).join('')}
            `;
        }

        function renderFoods(foodList) {
            const grid = document.getElementById('foodGrid');
            if (foodList.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🍽️</div>
                        <h3>Bu kategoriyada taomlar yo'q</h3>
                    </div>
                `;
                return;
            }
            grid.innerHTML = foodList.map(food => {
                const cat = categories.find(c => c.name === food.category);
                const hasImage = food.image && food.image.length > 0;
                return `
                <div class="food-card">
                    <div class="food-image" ${hasImage ? `style="background: none;"` : ''}>
                        ${hasImage ? `<img src="${food.image}" alt="${food.name}">` : (cat ? cat.icon : '🍽️')}
                        <span class="food-badge">Yangi</span>
                    </div>
                    <div class="food-info">
                        <div class="food-category">${food.category}</div>
                        <div class="food-name">${food.name}</div>
                        <div class="food-description">${food.description || ''}</div>
                        <div class="food-footer">
                            <div class="food-price">${formatPrice(food.price)}</div>
                            <button class="add-to-cart" onclick="addToCart(${food.id}, '${food.name.replace(/'/g, "\\'")}', ${food.price})">
                                + Qo'shish
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function filterFoods(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.querySelector('.category-name').textContent === (category || 'Hammasi'));
            });
            
            document.getElementById('sectionTitle').textContent = category || 'Barcha taomlar';
            
            if (category) {
                renderFoods(foods.filter(f => f.category === category));
            } else {
                renderFoods(foods);
            }
        }

        function addToCart(id, name, price) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            saveCart();
            updateCartUI();
            toggleCart();
        }

        function updateQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(item => item.id !== id);
                }
                saveCart();
                updateCartUI();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartSubtotal = document.getElementById('cartSubtotal');
            const cartTotal = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <h3>Savat bo'sh</h3>
                        <p>Mazali taomlarni qo'shing!</p>
                    </div>
                `;
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-image">🍽️</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${formatPrice(item.price)}</div>
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="updateQuantity('${item.id}', -1)">−</button>
                                <span class="quantity-value">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                            </div>
                        </div>
                        <div class="remove-item" onclick="removeFromCart('${item.id}')">🗑️</div>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartSubtotal.textContent = formatPrice(total);
            cartTotal.textContent = formatPrice(total);
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function goToCheckout() {
            if (cart.length === 0) {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.showAlert('Savat bo\'sh!');
                } else {
                    alert('Savat bo\'sh!');
                }
                return;
            }
            window.location.href = '/checkout.html';
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('uz-UZ').format(price) + " so'm";
        }
    </script>
</body>
</html>
