<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot - Auto Update</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status.running {
            background: #d4edda;
            color: #155724;
        }
        .status.stopped {
            background: #f8d7da;
            color: #721c24;
        }
        .log {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .log-entry.error {
            color: #dc3545;
        }
        .log-entry.success {
            color: #28a745;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn-start {
            background: #28a745;
            color: white;
        }
        .btn-start:hover {
            background: #218838;
        }
        .btn-stop {
            background: #dc3545;
            color: white;
        }
        .btn-stop:hover {
            background: #c82333;
        }
        .btn-clear {
            background: #6c757d;
            color: white;
        }
        .btn-clear:hover {
            background: #5a6268;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 8px;
            color: #004085;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Telegram Bot - Food Delivery</h1>
        
        <div id="status" class="status stopped">
            Status: To'xtatilgan
        </div>
        
        <div class="log" id="log">
            <div class="log-entry">Bot ishga tushirish uchun "Start" tugmasini bosing...</div>
        </div>
        
        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startBot()">Start</button>
            <button class="btn-stop" id="stopBtn" onclick="stopBot()" disabled>Stop</button>
            <button class="btn-clear" onclick="clearLog()">Clear Log</button>
        </div>
        
        <div class="info">
            <strong>Qo'llanma:</strong><br>
            1. "Start" tugmasini bosing<br>
            2. Telegram da botga /start yuboring<br>
            3. "Ovqat buyurtma berish" tugmasini bosing<br>
            4. Saytda buyurtma bering<br>
            5. Botga xabar keladi!
        </div>
    </div>

    <script>
        let intervalId = null;
        let isRunning = false;

        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus(running) {
            const status = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (running) {
                status.className = 'status running';
                status.textContent = 'Status: Ishlamoqda...';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                status.className = 'status stopped';
                status.textContent = 'Status: To\'xtatilgan';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function fetchUpdates() {
            fetch('bot.php?get_updates=1')
                .then(response => response.text())
                .then(data => {
                    if (data.includes('Updates processed')) {
                        addLog(data, 'success');
                    }
                })
                .catch(error => {
                    addLog('Xatolik: ' + error, 'error');
                });
        }

        function startBot() {
            if (isRunning) return;
            
            isRunning = true;
            updateStatus(true);
            addLog('Bot ishga tushdi!', 'success');
            
            // First fetch immediately
            fetchUpdates();
            
            // Then fetch every 3 seconds
            intervalId = setInterval(fetchUpdates, 3000);
        }

        function stopBot() {
            if (!isRunning) return;
            
            isRunning = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            updateStatus(false);
            addLog('Bot to\'xtatildi');
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '<div class="log-entry">Log tozalandi...</div>';
        }

        // Auto-start on page load
        window.onload = function() {
            addLog('Sahifa yuklandi. Botni ishga tushirish uchun "Start" tugmasini bosing.');
        };
    </script>
</body>
</html>
